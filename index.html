<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isak Graarud | Online CV</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- Navigation -->
  <header class="header">
    <a href="#about" class="nav-initials">IG</a>
    <nav class="nav">
      <div class="nav-spacer"></div>
      <ul class="nav-tabs">
        <li><a href="#about" class="nav-tab active" data-tab="about">About Me</a></li>
        <li><a href="#github" class="nav-tab" data-tab="github">Github</a></li>
        <li><a href="#career" class="nav-tab" data-tab="career">Career</a></li>
      </ul>
      <div class="nav-spacer"></div>
    </nav>
  </header>

  <main class="main">
    <!-- About Me Section -->
    <section id="about" class="page-section active" data-section="about">
      <div class="section-content animate-on-scroll">
      <h1 class="section-title">Hi, my name is Isak 👋</h1>
        <div class="card about-card">
          <div class="about-content">
            <img alt="Isak Graarud" class="about-photo"  src=""/>
            <p id="bio-intro" class="about-intro"> Loading bio...</p>
            <p id="bio-story"></p>
          </div>
          <div class="social-links">
            <a href="https://github.com/Isakgraarud" class="btn btn-primary" target="_blank" rel="noopener">
              View my GitHub
            </a>
            <a href="https://www.linkedin.com/in/isak-graarud" class="btn btn-secondary">LinkedIn</a>
            <a href="mailto:isak.graarud@gmail.com" class="btn btn-secondary">Email</a>
          </div>
        </div>
      </div>
    </section>

    <!-- GitHub Section -->
    <section id="github" class="page-section" data-section="github">
      <div class="section-content animate-on-scroll">
        <h1 class="section-title">Github</h1>
        <div class="card github-card">
          <p>Explore my projects, contributions, and open-source work on GitHub.</p>
          <a href="https://github.com/Isakgraarud" class="btn btn-primary btn-large" target="_blank" rel="noopener">
            Visit my GitHub Profile →
          </a>
        </div>
      </div>
    </section>

    <!-- career Section -->
    <section id="career" class="page-section" data-section="career">
      <div class="section-content animate-on-scroll">
        <h1 class="section-title">Education</h1>
        <div class="card">
          <ul class="education-list animate-on-scroll stagger-children" id="education-list"></ul>
          <h1 class="section-title">Professional Experience</h1>
          <ul class="career-list animate-on-scroll stagger-children" id="career-list"></ul>
        <a href="docs/testFile.pdf" class="btn btn-primary" download> Download CV (PDF) </a>
        </div>
      </div>
    </section>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
